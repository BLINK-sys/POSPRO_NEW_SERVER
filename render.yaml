services:
  - type: web
    name: pospro-shop-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pospro-shop-db
          property: connectionString

databases:
  - name: pospro-shop-db
    databaseName: pospro_server_db
    user: pospro_user
    plan: free
